# docker-compose.yml
version: '3.8'

services:
  bot:
    build: .
    container_name: telegram_bot
    restart: always
    environment:
      - MAIN_BOT_TOKEN=${MAIN_BOT_TOKEN}
      - DB_BOT_TOKEN=${DB_BOT_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bot_db
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: bot_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
